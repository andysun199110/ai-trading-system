version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    env_file: .env
    depends_on:
      - db
      - redis
      - mt5
    restart: unless-stopped
    ports:
      - "8000:8000"
    networks:
      - trading
      - mt5-network
    environment:
      - MT5_BRIDGE_HOST=mt5
      - MT5_BRIDGE_PORT=18812

  mt5:
    image: gmag11/metatrader5_vnc
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "5900:5900"
      - "8001:8001"
    environment:
      - WINEPREFIX=/config/.wine
      - WINEDEBUG=-all
      - MT5_LOGIN=${MT5_LOGIN:-}
      - MT5_PASSWORD=${MT5_PASSWORD:-}
      - MT5_SERVER=${MT5_SERVER:-}
      - MT5_SERVER_ADDRESS=${MT5_SERVER_ADDRESS:-}
    volumes:
      - mt5-data:/config
      - ./scripts/fix-mt5linux-start.sh:/etc/cont-init.d/01-fix-mt5linux:ro
      - ./scripts/02-config-mt5-login.sh:/etc/cont-init.d/02-config-mt5-login:ro
    networks:
      - mt5-network
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s=socket.socket(); s.settimeout(5); result=s.connect_ex(('localhost', 8001)); s.close(); exit(0 if result==0 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: gold
      POSTGRES_PASSWORD: gold
      POSTGRES_DB: gold_ai
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - trading

  redis:
    image: redis:7
    restart: unless-stopped
    networks:
      - trading

  nginx:
    image: nginx:1.27
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - trading

networks:
  trading:
    driver: bridge
  mt5-network:
    driver: bridge

volumes:
  pgdata:
  mt5-data:
