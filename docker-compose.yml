version: '3.9'
services:
  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    env_file: .env
    depends_on: [db, redis, mt5]
    restart: unless-stopped
    ports: ["8000:8000"]
    networks: [default, mt5-network]
  mt5:
    image: python:3.11-slim
    command: ["bash", "-lc", "python -m pip install --no-cache-dir rpyc==5.2.3 mt5linux==1.0.3 'numpy<2.0' && sleep infinity"]
    restart: unless-stopped
    networks: [mt5-network]
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: gold
      POSTGRES_PASSWORD: gold
      POSTGRES_DB: gold_ai
    volumes: ["pgdata:/var/lib/postgresql/data"]
    restart: unless-stopped
  redis:
    image: redis:7
    restart: unless-stopped
  nginx:
    image: nginx:1.27
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports: ["80:80"]
    depends_on: [api]
    restart: unless-stopped
volumes:
  pgdata:

networks:
  mt5-network:
    name: mt5-network
