name: verify-stage2
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -e .[dev]
      
      - name: Verify critical files exist
        run: |
          echo "Checking critical files..."
          test -f services/ai_orchestrator/provider.py || { echo "FAIL: provider.py missing"; exit 1; }
          test -f services/ai_orchestrator/service.py || { echo "FAIL: service.py missing"; exit 1; }
          test -f infra/scripts/verify_stage2.sh || { echo "FAIL: verify_stage2.sh missing"; exit 1; }
          test -f infra/migrations/versions/0002_stage2_schema_normalization.py || { echo "FAIL: 0002 migration missing"; exit 1; }
          echo "✓ All critical files present"
      
      - name: Verify provider abstraction
        run: |
          echo "Checking provider abstraction..."
          grep -q "class DeepSeekProvider" services/ai_orchestrator/provider.py || { echo "FAIL: DeepSeekProvider missing"; exit 1; }
          grep -q "class MockProvider" services/ai_orchestrator/provider.py || { echo "FAIL: MockProvider missing"; exit 1; }
          grep -q "def generate" services/ai_orchestrator/provider.py || { echo "FAIL: generate method missing"; exit 1; }
          echo "✓ Provider abstraction verified"
      
      - name: Verify AI configuration
        run: |
          echo "Checking AI configuration..."
          grep -q "ai_provider" shared/config/settings.py || { echo "FAIL: ai_provider missing"; exit 1; }
          grep -q "deepseek_api_key" shared/config/settings.py || { echo "FAIL: deepseek_api_key missing"; exit 1; }
          grep -q "ai_timeout_ms" shared/config/settings.py || { echo "FAIL: ai_timeout_ms missing"; exit 1; }
          grep -q "ai_max_retries" shared/config/settings.py || { echo "FAIL: ai_max_retries missing"; exit 1; }
          echo "✓ AI configuration verified"
      
      - name: Verify stage2 versions
        run: |
          echo "Checking stage2 versions..."
          grep -q "STRATEGY_VERSION=stage2" .env.example || { echo "FAIL: STRATEGY_VERSION not stage2"; exit 1; }
          grep -q "MODEL_VERSION=ai-stage2-v1" .env.example || { echo "FAIL: MODEL_VERSION not ai-stage2-v1"; exit 1; }
          grep -q "CONFIG_VERSION=2026.04.stage2" .env.example || { echo "FAIL: CONFIG_VERSION not 2026.04.stage2"; exit 1; }
          echo "✓ Stage2 versions verified"
      
      - name: Run unit tests
        run: |
          echo "Running unit tests..."
          pytest tests/unit -v --tb=short
      
      - name: Run contract tests
        run: |
          echo "Running contract tests..."
          pytest tests/contracts -v --tb=short
      
      - name: Verify JSON contract enforcement
        run: |
          echo "Checking JSON contract..."
          grep -q "REQUIRED_FIELDS" services/ai_orchestrator/provider.py || { echo "FAIL: REQUIRED_FIELDS missing"; exit 1; }
          grep -q "validate_contract" services/ai_orchestrator/provider.py || { echo "FAIL: validate_contract missing"; exit 1; }
          echo "✓ JSON contract enforcement verified"
